<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔成长基地 v7.1</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        
        :root {
            --eggy-yellow: #F6B400;
            --eggy-orange: #FF7A00;
            --eggy-bg: #FFFDF0;
        }

        body {
            background-color: var(--eggy-bg);
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif;
            color: #4A4A4A;
        }

        .eggy-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 0 #F1E9CC;
            transition: all 0.2s ease;
            border: 2px solid #F1E9CC;
        }

        /* 任务完成后的置灰效果 */
        .task-done {
            background: #f8f8f8 !important;
            box-shadow: none !important;
            border-color: #eee !important;
            opacity: 0.7;
            transform: none !important;
        }

        .eggy-card:not(.task-done):active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #F1E9CC;
        }

        .btn-primary {
            background: linear-gradient(180deg, #FFD600 0%, #F6B400 100%);
            box-shadow: 0 4px 0 #C48F00;
            border-radius: 16px;
            color: white;
            text-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        /* 完成后的按钮置灰 */
        .btn-done {
            background: #ccc !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .btn-primary:not(.btn-done):active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #C48F00;
        }

        .tab-active {
            background: var(--eggy-yellow) !important;
            color: white !important;
            box-shadow: 0 4px 0 #C48F00 !important;
        }

        .status-bar {
            background: white;
            border-radius: 30px;
            border: 4px solid #F6B400;
            position: relative;
            overflow: hidden;
        }

        .status-progress {
            background: linear-gradient(90deg, #FFD600, #FF7A00);
            height: 100%;
            transition: width 0.5s ease;
        }

        .floating-eggy {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="app" class="max-w-md mx-auto p-4">
        
        <!-- Login Page -->
        <div v-if="!isLoggedIn" class="min-h-[80vh] flex flex-col items-center justify-center space-y-8 animate__animated animate__fadeIn">
            <div class="relative">
                <div class="text-8xl floating-eggy">🥚</div>
                <div class="absolute -bottom-2 -right-2 bg-white rounded-full p-2 shadow-lg text-2xl">✨</div>
            </div>
            <h1 class="text-4xl font-black text-[#F6B400] tracking-wider text-center">
                蛋仔成长基地<br>
                <span class="text-sm text-gray-400 font-normal">Eggy Adventure v7.1</span>
            </h1>
            <div class="w-full space-y-4 px-6">
                <input v-model="loginForm.username" type="text" placeholder="输入蛋仔暗号" class="w-full p-4 rounded-2xl border-4 border-yellow-100 outline-none focus:border-yellow-400 text-center text-xl font-bold transition-all">
                <input v-model="loginForm.password" type="password" placeholder="输入冒险密码" class="w-full p-4 rounded-2xl border-4 border-yellow-100 outline-none focus:border-yellow-400 text-center text-xl font-bold transition-all">
                <button @click="handleLogin" class="w-full btn-primary p-5 text-2xl font-black">开启冒险!</button>
            </div>
        </div>

        <!-- Main Content -->
        <div v-else class="animate__animated animate__fadeIn">
            <!-- Header Status -->
            <header class="mb-8 pt-4">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center space-x-2">
                        <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-xl border-2 border-white shadow-md">👤</div>
                        <div>
                            <div class="text-xs text-gray-400 font-bold uppercase">当前冒险者</div>
                            <div class="text-lg font-black text-gray-700 leading-tight">{{ user.username }}</div>
                        </div>
                    </div>
                    <button @click="logout" class="bg-gray-100 text-gray-400 px-4 py-2 rounded-xl text-sm font-bold hover:bg-gray-200 transition-colors">登出</button>
                </div>

                <div class="bg-white rounded-[32px] p-6 shadow-xl border-b-[10px] border-yellow-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl">✨</div>
                    <p class="text-gray-400 font-black text-sm mb-1">ENERGY POINTS / 能量积分</p>
                    <div class="flex items-baseline space-x-2">
                        <span class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-yellow-600">{{ points }}</span>
                        <span class="text-orange-300 font-bold">PTS</span>
                    </div>
                    <div class="status-bar h-4 mt-4">
                        <div class="status-progress" :style="{ width: Math.min((points/500)*100, 100) + '%' }"></div>
                    </div>
                </div>
            </header>

            <!-- Navigation Tabs -->
            <nav class="flex gap-3 mb-8">
                <button v-for="t in ['tasks', 'medals', 'admin']" 
                        v-if="t !== 'admin' || user.role === 'admin'"
                        @click="tab = t" 
                        :class="tab === t ? 'tab-active' : 'bg-white text-gray-400'" 
                        class="flex-1 py-4 rounded-2xl font-black shadow-sm border-b-4 border-transparent transition-all capitalize">
                    {{ t === 'tasks' ? '🎯 任务' : t === 'medals' ? '🏆 成就' : '⚙️ 管理' }}
                </button>
            </nav>

            <!-- Tasks View -->
            <div v-if="tab === 'tasks'" class="space-y-4 px-1">
                <div v-for="task in tasks" :key="task.id" 
                     :class="{'task-done': task.completed}"
                     class="eggy-card p-5 flex justify-between items-center group">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 rounded-2xl bg-yellow-50 flex items-center justify-center text-2xl">
                            {{ task.completed ? '✅' : (task.title.includes('书') ? '📚' : '🚀') }}
                        </div>
                        <div>
                            <div class="font-black text-xl" :class="task.completed ? 'text-gray-400 line-through' : 'text-gray-800'">{{ task.title }}</div>
                            <div class="flex items-center text-xs font-bold mt-1">
                                <span v-if="!task.completed" class="bg-orange-50 text-orange-400 px-2 py-0.5 rounded-md mr-2">+{{ task.points }} 积分</span>
                                <span v-else class="text-gray-300">今日已达成!</span>
                            </div>
                        </div>
                    </div>
                    <button @click="completeTask(task)" 
                            :disabled="task.completed"
                            :class="{'btn-done': task.completed}"
                            class="btn-primary px-6 py-3 font-black text-sm">
                        {{ task.completed ? '已完成' : '完成!' }}
                    </button>
                </div>
            </div>

            <!-- Medals View -->
            <div v-if="tab === 'medals'" class="grid grid-cols-3 gap-6 px-1">
                <div v-for="m in milestones" :key="m.id" class="flex flex-col items-center">
                    <div :class="{'medal-locked': points < (m.id * 50)}" 
                         class="bg-white aspect-square w-full rounded-[30px] shadow-lg p-4 flex items-center justify-center mb-3 border-b-8 border-gray-100 group relative">
                        <img :src="m.icon_url" class="w-full h-full object-contain group-hover:rotate-12 transition-transform">
                        <div v-if="points < (m.id * 50)" class="absolute inset-0 flex items-center justify-center bg-black/5 rounded-[30px]">
                            <span class="text-2xl">🔒</span>
                        </div>
                    </div>
                    <div class="text-xs font-black text-gray-600 text-center leading-tight">
                        {{ m.name }}<br>
                        <span class="text-[9px] text-orange-300 font-bold" v-if="points < (m.id * 50)">{{ m.id * 50 }}分解锁</span>
                    </div>
                </div>
            </div>

            <!-- Admin View -->
            <div v-if="tab === 'admin' && user.role === 'admin'" class="space-y-6">
                <div class="flex justify-between bg-white p-4 rounded-3xl shadow-md border-b-4 border-gray-100">
                    <button @click="adjustPoints(10)" class="flex-1 py-3 px-2 mx-1 bg-green-50 text-green-600 rounded-2xl font-black text-sm border-2 border-green-100">+10 奖励</button>
                    <button @click="adjustPoints(-10)" class="flex-1 py-3 px-2 mx-1 bg-red-50 text-red-600 rounded-2xl font-black text-sm border-2 border-red-100">-10 扣分</button>
                </div>

                <div class="bg-white p-6 rounded-[32px] border-4 border-dashed border-yellow-200 shadow-inner">
                    <h3 class="font-black text-yellow-700 mb-4 flex items-center">✨ 发布新冒险</h3>
                    <div class="space-y-3">
                        <input v-model="newTask.title" placeholder="任务名称" class="w-full p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                        <div class="flex gap-3">
                            <input v-model="newTask.points" type="number" placeholder="积分" class="flex-1 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                            <input v-model="newTask.duration" type="number" placeholder="时间" class="flex-1 p-4 rounded-2xl bg-gray-50 border-none text-sm font-bold outline-none">
                        </div>
                        <button @click="addTask" class="w-full btn-primary p-4 font-black text-lg">发布任务</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="font-black text-gray-400 text-xs px-2">任务管理</h3>
                    <div v-for="task in tasks" :key="task.id" class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div class="font-bold text-gray-700">{{ task.title }}</div>
                        <button @click="deleteTask(task.id)" class="text-red-400 p-2">🗑️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const savedUser = localStorage.getItem('eggy_user')
                const isLoggedIn = ref(savedUser ? true : false)
                const user = ref(savedUser ? JSON.parse(savedUser) : null)
                const tab = ref('tasks')
                const points = ref(0)
                const tasks = ref([])
                const milestones = ref([])
                const loginForm = ref({ username: '', password: '' })
                const newTask = ref({ title: '', points: 10, duration: 20 })

                const handleLogin = async () => {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(loginForm.value)
                    })
                    const data = await res.json()
                    if(data.success) {
                        isLoggedIn.value = true; user.value = data.user
                        localStorage.setItem('eggy_user', JSON.stringify(data.user))
                        fetchData()
                    } else { alert("暗号有误") }
                }

                const fetchData = async () => {
                    const status = await (await fetch('/api/status')).json()
                    points.value = status.total_points || 0
                    tasks.value = await (await fetch('/api/tasks')).json()
                    milestones.value = await (await fetch('/api/milestones')).json()
                }

                const completeTask = async (task) => {
                    if(task.completed) return
                    if(confirm(`确认完成【${task.title}】领分吗？`)) {
                        await fetch('/api/tasks/complete', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ task_id: task.id, points: task.points, title: task.title })
                        })
                        fetchData()
                    }
                }

                const addTask = async () => {
                    await fetch('/api/tasks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(newTask.value)
                    })
                    newTask.value.title = ''; fetchData()
                }

                const deleteTask = async (id) => {
                    if(confirm("确定删除？")) {
                        await fetch(`/api/tasks/delete/${id}`, { method: 'POST' })
                        fetchData()
                    }
                }

                const adjustPoints = async (amount) => {
                    await fetch('/api/status/adjust', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ amount, reason: '调整' })
                    })
                    fetchData()
                }

                const logout = () => { isLoggedIn.value = false; localStorage.removeItem('eggy_user') }
                onMounted(() => { if(isLoggedIn.value) fetchData() })

                return { isLoggedIn, user, tab, points, tasks, milestones, loginForm, newTask, handleLogin, fetchData, completeTask, addTask, deleteTask, adjustPoints, logout }
            }
        }).mount('#app')
    </script>
</body>
</html>
