<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛋仔成长基地 v6.0</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .eggy-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .medal-locked { filter: grayscale(1) opacity(0.5); }
        .login-bg { background: linear-gradient(135deg, #FFF9E3 0%, #FFF1C1 100%); }
    </style>
</head>
<body class="bg-[#FFFDF0] min-h-screen font-sans">
    <div id="app" class="max-w-md mx-auto">
        
        <!-- Login Page -->
        <div v-if="!isLoggedIn" class="min-h-screen flex flex-col items-center justify-center p-8 login-bg">
            <div class="text-7xl mb-6 animate__bounce animate__infinite">🥚</div>
            <h1 class="text-3xl font-black text-[#F6B400] mb-8">蛋仔成长基地</h1>
            <div class="w-full space-y-4">
                <input v-model="loginForm.username" type="text" placeholder="蛋仔账号" class="w-full p-4 rounded-2xl border-2 border-yellow-100 outline-none font-bold">
                <input v-model="loginForm.password" type="password" placeholder="冒险密码" class="w-full p-4 rounded-2xl border-2 border-yellow-100 outline-none font-bold">
                <button @click="handleLogin" class="w-full bg-[#F6B400] text-white p-4 rounded-2xl font-black text-lg shadow-lg shadow-yellow-200">进入基地</button>
            </div>
        </div>

        <!-- Main Content -->
        <div v-else class="pb-32 animate__animated animate__fadeIn">
            <header class="p-6 text-center">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold">角色: {{ user.username }}</span>
                    <button @click="logout" class="text-gray-400 text-xs font-bold">退出</button>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-xl border-b-8 border-yellow-100">
                    <p class="text-gray-400 font-bold text-xs uppercase">能量积分</p>
                    <div class="text-5xl font-black text-[#FF7A00]">{{ points }}</div>
                </div>
            </header>

            <div class="flex px-6 gap-2 mb-6">
                <button @click="tab = 'tasks'" :class="tab === 'tasks' ? 'bg-[#F6B400] text-white' : 'bg-white text-gray-400'" class="flex-1 py-3 rounded-2xl font-bold shadow-sm">任务</button>
                <button @click="tab = 'medals'" :class="tab === 'medals' ? 'bg-[#F6B400] text-white' : 'bg-white text-gray-400'" class="flex-1 py-3 rounded-2xl font-bold shadow-sm">成就</button>
                <button @click="tab = 'admin'" :class="tab === 'admin' ? 'bg-[#F6B400] text-white' : 'bg-white text-gray-400'" class="flex-1 py-3 rounded-2xl font-bold shadow-sm">管理</button>
            </div>

            <div v-if="tab === 'tasks'" class="px-6 space-y-4">
                <div v-for="task in tasks" :key="task.id" class="eggy-card bg-white p-4 rounded-3xl shadow-md flex justify-between items-center">
                    <div>
                        <div class="font-black text-gray-800">{{ task.title }}</div>
                        <div class="text-xs font-bold text-gray-400">{{ task.type }} | +{{ task.points }}积分</div>
                    </div>
                    <button @click="completeTask(task)" class="bg-[#F6B400] text-white px-5 py-2 rounded-2xl font-black text-sm">开始</button>
                </div>
            </div>

            <div v-if="tab === 'medals'" class="px-6 grid grid-cols-3 gap-4">
                <div v-for="m in milestones" :key="m.id" class="text-center">
                    <div :class="{'medal-locked': points < 100}" class="bg-white aspect-square rounded-3xl shadow-md p-3 flex items-center justify-center mb-2 border-b-4 border-gray-100">
                        <img :src="m.icon_url" class="w-full h-full object-contain">
                    </div>
                    <div class="text-[10px] font-black text-gray-600 truncate">{{ m.name }}</div>
                </div>
            </div>

            <div v-if="tab === 'admin'" class="px-6 space-y-6">
                <div class="bg-yellow-50 p-4 rounded-3xl border-2 border-dashed border-yellow-200">
                    <h3 class="font-black text-yellow-700 mb-3 text-sm">✨ 新增冒险任务</h3>
                    <div class="space-y-2">
                        <input v-model="newTask.title" placeholder="任务名称" class="w-full p-3 rounded-xl border-none text-sm font-bold shadow-sm">
                        <div class="flex gap-2">
                            <input v-model="newTask.points" type="number" placeholder="积分" class="w-1/2 p-3 rounded-xl border-none text-sm font-bold shadow-sm">
                            <input v-model="newTask.duration" type="number" placeholder="分钟" class="w-1/2 p-3 rounded-xl border-none text-sm font-bold shadow-sm">
                        </div>
                        <button @click="addTask" class="w-full bg-yellow-400 text-yellow-900 p-3 rounded-xl font-black text-sm shadow-md">发布任务</button>
                    </div>
                </div>
                <div class="space-y-3">
                    <div v-for="task in tasks" :key="task.id" class="bg-white p-3 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div class="text-sm font-bold text-gray-700">{{ task.title }}</div>
                        <button @click="deleteTask(task.id)" class="bg-red-50 text-red-500 p-2 rounded-xl text-xs font-bold">删除</button>
                    </div>
                </div>
                <div class="flex justify-around pt-4 border-t">
                    <button @click="adjustPoints(10)" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold shadow-lg text-xs">+10 奖励</button>
                    <button @click="adjustPoints(-10)" class="bg-red-500 text-white px-6 py-2 rounded-full font-bold shadow-lg text-xs">-10 扣分</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const isLoggedIn = ref(false)
                const user = ref(null)
                const tab = ref('tasks')
                const points = ref(0)
                const tasks = ref([])
                const milestones = ref([])
                const loginForm = ref({ username: '', password: '' })
                const newTask = ref({ title: '', points: 10, duration: 20, type: '学习', description: '', icon_color: 'bg-blue-100' })

                const handleLogin = async () => {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(loginForm.value)
                    })
                    const data = await res.json()
                    if(data.success) {
                        isLoggedIn.value = true
                        user.value = data.user
                        fetchData()
                    } else { alert("暗号有误！") }
                }

                const fetchData = async () => {
                    const status = await (await fetch('/api/status')).json()
                    points.value = status.total_points || 0
                    tasks.value = await (await fetch('/api/tasks')).json()
                    milestones.value = await (await fetch('/api/milestones')).json()
                }

                const completeTask = async (task) => {
                    if(confirm(`确定完成了【${task.title}】并领取 ${task.points} 积分吗？`)) {
                        await fetch('/api/tasks/complete', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ task_id: task.id, points: task.points, title: task.title })
                        })
                        fetchData()
                        alert("积分已到账！蛋仔真棒！")
                    }
                }

                const addTask = async () => {
                    if(!newTask.value.title) return
                    await fetch('/api/tasks', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(newTask.value)
                    })
                    newTask.value.title = ''
                    fetchData()
                }

                const deleteTask = async (id) => {
                    if(!confirm("确定删除吗？")) return
                    await fetch(`/api/tasks/${id}`, { method: 'DELETE' })
                    fetchData()
                }

                const adjustPoints = async (amount) => {
                    await fetch('/api/status/adjust', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ amount, reason: '管理员调整' })
                    })
                    fetchData()
                }

                const logout = () => { isLoggedIn.value = false }
                onMounted(fetchData)

                return { isLoggedIn, user, tab, points, tasks, milestones, loginForm, newTask, handleLogin, fetchData, completeTask, addTask, deleteTask, adjustPoints, logout }
            }
        }).mount('#app')
    </script>
</body>
</html>
